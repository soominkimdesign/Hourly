<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourly - Save your inspiration every hourly.</title>
  <style>
    :root { --bg:#f3f2ef; --surface:#fff; --ink:#111; --muted:#74726d; --line:#d7d5cf; --accent:#ff5a00; --radius:20px; }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
    .app{max-width:1100px;margin:0 auto;padding:24px;display:grid;gap:16px}
    .card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:0 8px 24px rgba(0,0,0,.06)}
    h1,h2,h3,p{margin:0}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px}
    .muted{color:var(--muted)}
    textarea{width:100%;min-height:120px;padding:14px;border:1px solid var(--line);border-radius:14px;resize:vertical;font:inherit}
    button{border:0;border-radius:999px;padding:10px 14px;font-weight:700;cursor:pointer}
    .primary{background:var(--accent);color:#fff}
    .ghost{background:#eceae5}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
    .note{border:1px solid var(--line);border-radius:14px;padding:12px;background:#fcfbf7;display:grid;gap:8px}
    .chip{display:inline-block;padding:4px 8px;border-radius:999px;background:#f0efeb;font-size:12px}
    .meta{font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
    .summary{display:grid;gap:8px}
    h1,h2,h3{letter-spacing:0.02em}
    p,textarea,button{letter-spacing:0.01em}
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1 id="brandTitle">Hourly - Save your inspiration every hourly.</h1>
      <p id="today" class="muted" style="margin-top:6px"></p>
      <p class="muted" style="margin:8px 0 12px">생각을 먼저 입력하고, 아래 카드에서 바로 확인하세요.</p>
      <textarea id="input" placeholder="생각을 입력하세요..."></textarea>
      <div class="row" style="margin-top:10px">
        <button class="primary" id="addBtn">Save to Temporary</button>
        <button class="ghost" id="saveAllBtn">Save All Today</button>
        <button class="ghost" id="resetBtn">Reset Sample</button>
      </div>
    </section>

    <section class="card summary">
      <h2>Today Summary</h2>
      <p id="summary" class="muted"></p>
    </section>

    <section class="card">
      <h2>Cards</h2>
      <div id="grid" class="grid" style="margin-top:10px"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'hourly_prototype_notes_v1';
    const sampleNotes = [
      { id: cryptoId(), text:'기록 앱 아이디어. 하루 끝에 자동 분류되면 좋겠다.', createdAt:new Date().toISOString(), status:'temporary', starred:false },
      { id: cryptoId(), text:'회의 deadline은 금요일. 모바일앱 구조 검토 필요.', createdAt:new Date().toISOString(), status:'saved', starred:true }
    ];

    document.title = 'Hourly - Save your inspiration every hourly.';
    let notes = loadNotes();
    render();

    document.getElementById('addBtn').addEventListener('click', () => {
      const el = document.getElementById('input');
      const text = el.value.trim();
      if (!text) return;
      notes.unshift({ id: cryptoId(), text, createdAt: new Date().toISOString(), status:'temporary', starred:false });
      saveNotes(); el.value=''; render();
    });

    document.getElementById('saveAllBtn').addEventListener('click', () => {
      const key = dateKey(new Date());
      notes = notes.map(n => dateKey(n.createdAt)===key ? { ...n, status:'saved' } : n);
      saveNotes(); render();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY); notes = [...sampleNotes]; saveNotes(); render();
    });

    function render() {
      document.getElementById('today').textContent = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
      const todayNotes = notes.filter(n => dateKey(n.createdAt) === dateKey(new Date()));
      document.getElementById('summary').textContent = buildDailySummary(todayNotes.map(enrich));
      document.getElementById('grid').innerHTML = todayNotes.length ? todayNotes.map(n => cardHtml(enrich(n))).join('') : '<p class="muted">오늘 카드가 없습니다.</p>';
    }

    function cardHtml(n) {
      return `<article class="note"><div class="row"><span class="chip">${n.category}</span><button class="ghost" onclick="toggleStar('${n.id}')">${n.starred?'★':'☆'}</button><button class="ghost" onclick="del('${n.id}')">Delete</button></div><h3>${escapeHtml(n.title)}</h3><p class="muted">${escapeHtml(n.preview)}</p><div class="meta"><span>${new Date(n.createdAt).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}</span><span>${n.starred?'Starred':n.status}</span></div></article>`;
    }

    window.toggleStar = function(id){ notes = notes.map(n => n.id===id ? { ...n, starred:!n.starred } : n); saveNotes(); render(); }
    window.del = function(id){ notes = notes.filter(n => n.id!==id); saveNotes(); render(); }

    function enrich(n){ return { ...n, category: classify(n.text), title: makeTitle(n.text), preview: makePreview(n.text) }; }
    function classify(t){ const s=t.toLowerCase(); if(/deadline|회의|일정/.test(s)) return 'Schedule'; if(/아이디어|app|idea/.test(s)) return 'Idea'; if(/왜|how|question|\?/.test(s)) return 'Question'; return 'Diary'; }
    function makeTitle(t){ const c=t.trim(); return c.length>20?c.slice(0,20)+'…':c||'Untitled'; }
    function makePreview(t){ const c=t.trim(); return c.length>90?c.slice(0,90)+'…':c; }
    function buildDailySummary(items){ if(!items.length) return '오늘 기록이 아직 없습니다.'; const cats=[...new Set(items.map(i=>i.category))].slice(0,3).join(', '); return `오늘은 ${cats} 중심으로 ${items.length}개의 기록이 쌓였습니다.`; }
    function loadNotes(){ try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : [...sampleNotes]; }catch{ return [...sampleNotes]; } }
    function saveNotes(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
    function dateKey(d){ const x=new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
    function escapeHtml(v){ return String(v).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;'); }
    function cryptoId(){ const c = globalThis.crypto; return (c && c.randomUUID ? c.randomUUID() : ('id-'+Math.random().toString(36).slice(2)+Date.now())); }
  </script>
</body>
</html>
